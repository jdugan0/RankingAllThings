<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranking All Things</title>
    <style>
      #choices {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        align-items: stretch;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        text-align: center;
      }
      .card {
        width: 300px;
        padding: 1rem;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
      }
      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
      }
    </style>
  </head>
  <body>
    <h1>Ranking All Things</h1>
    <p>Click the one you think is better.</p>

    <div id="choices"></div>

    <script src="script.js" defer></script>
  </body>
</html>
